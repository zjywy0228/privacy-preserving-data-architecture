name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check (core modules)
        run: |
          mypy fhe-feature-extraction/fhe_pipeline.py \
               dp-llm-training/dp_trainer.py \
               dp-llm-training/budget_accountant.py \
               llm-leakage-assessment/assessment_runner.py \
               --ignore-missing-imports \
               --no-strict-optional

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov --cov-config=.coveragerc --cov-fail-under=65

  validate-nist-csv:
    name: Validate NIST control-mapping CSV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate NIST control-mapping CSV
        run: python tools/validate_control_mapping.py --min-rows 30
